  <rect x="68" y="60" width="50" height="4" rx="2" fill="#3B82F6"/>
  <rect x="68" y="70" width="80" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="68" y="78" width="60" height="3" rx="1.5" fill="#E2E8F0"/>
  <polygon points="80,95 90,95 75,108" fill="white" stroke="#CBD5E1" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Second bubble -->
  <rect x="105" y="105" width="120" height="50" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
